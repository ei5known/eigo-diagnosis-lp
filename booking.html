<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>海外赴任サバイバル力診断 - 予約フォーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="booking">
    <section class="booking__intro">
      <h1>個別オンライン面談のご予約</h1>
      <p>
        診断でご入力いただいた情報をもとに、担当コーチが事前準備を行います。<br>
        ここでは<strong>ご希望の日時とセッション形式のみ</strong>をお知らせください。
      </p>
      <p class="booking__notice-email">
        診断で登録済みのメールアドレス宛に、予約確認メールをお送りします。<br>
        （メールアドレスを変更したい場合は、当日のオリエンテーションでお伝えください）
      </p>
    </section>

    <section class="booking__form">
      <form id="booking-form" method="post" action="YOUR_GAS_WEBAPP_URL">
        <!--
          // VERSION: booking.html v2026-04-24-1900
          // UPDATED: 2026-04-24 19:00 JST
          // CHANGES:
          //  - 予約フォームの「ユーザー入力必須項目」を3つに限定
          //      * 第1希望日時 (firstChoiceDatetime)
          //      * 第2希望日時 (secondChoiceDatetime)
          //      * 希望セッション形式 (sessionType)
          //  - 診断フォームで取得済みの情報は再入力させず、
          //    hidden input 経由でバックエンドに引き継ぐ構造に統一
          //  - 2026年欧米のオンラインマーケティングにおける
          //    「摩擦の少ない予約ファネル」「AIファーストなデータ構造」
          //    のトレンドを踏まえた設計に変更
          // REASON:
          //  - 診断で得たデータを活かして、予約ステップと後続メール、
          //    カレンダーイベントで「診断結果に基づく一文のパーソナライズ」を実現するため
          //  - 入力項目を最小化し、予約完了までのステップ数と心理的負荷を減らすため
        -->

        <!-- 1. ユーザー入力項目（最小限） -->
        <div class="form-group">
          <label for="firstChoiceDatetime">第1希望日時</label>
          <input id="firstChoiceDatetime"
                 name="firstChoiceDatetime"
                 type="datetime-local"
                 required>
        </div>

        <div class="form-group">
          <label for="secondChoiceDatetime">第2希望日時</label>
          <input id="secondChoiceDatetime"
                 name="secondChoiceDatetime"
                 type="datetime-local"
                 required>
        </div>

        <div class="form-group">
          <label for="sessionType">希望セッション形式</label>
          <select id="sessionType" name="sessionType" required>
            <option value="">選択してください</option>
            <option value="zoom">Zoom</option>
            <option value="google_meet">Google Meet</option>
            <option value="onsite">現地（対面）</option>
            <option value="phone">電話</option>
          </select>
        </div>

        <!-- 2. hidden: 診断データ一式（パーソナライズ用） -->
        <!--
          // 以下の hidden フィールドは、診断フォーム側で構築した
          // DIAGNOSIS_SESSION オブジェクトから自動で埋められる前提。
          // GAS/カレンダー/メール/生成AI が共通で利用する。
        -->
        <input type="hidden" id="email"            name="email">
        <input type="hidden" id="name"             name="name">
        <input type="hidden" id="role"             name="role">
        <input type="hidden" id="diagnosisId"      name="diagnosisId">
        <input type="hidden" id="scoreRank"        name="scoreRank">
        <input type="hidden" id="answersJson"      name="answersJson">
        <input type="hidden" id="segmentsJson"     name="segmentsJson">
        <input type="hidden" id="diagnosisSummary" name="diagnosisSummary">

        <!--
          // aiProfileVersion:
          //  - 生成AIが参照するプロファイル構造のバージョン管理用。
          //  - 将来JSON構造を変更する際の互換性判定に使用する想定。
        -->
        <input type="hidden" id="aiProfileVersion" name="aiProfileVersion" value="v1">

        <button type="submit" class="btn btn-primary">
          この内容で予約する
        </button>
      </form>
    </section>
  </main>

  <script>
    // VERSION: booking.js inline v2026-04-24-1900
    // UPDATED: 2026-04-24 19:00 JST
    // CHANGES:
    //  - 診断結果オブジェクト (DIAGNOSIS_SESSION or URL パラメータ "session")
    //    を取得し、予約フォームの hidden フィールドに展開する処理を追加。
    //  - これにより、バックエンド (Code.gs) で
    //      * personalizedLine (診断に基づく一文)
    //      * カレンダーイベント description
    //      * 予約確認メール本文
    //    のパーソナライズが可能になる。
    // REASON:
    //  - 「診断→予約→面談」の全フェーズで、一貫した文脈を維持しつつ、
    //    ユーザーに同じ情報を何度も入力させないため。
    //  - 生成AIによる8週間カリキュラム自動生成のためのデータ基盤を整えるため。

    (function initializeBookingForm() {
      // 1. 診断側からのデータ受け取り
      //    - window.DIAGNOSIS_SESSION を優先
      //    - 無ければ URL パラメータ "session" (JSON 文字列) を見る
      let session = null;

      if (window.DIAGNOSIS_SESSION) {
        session = window.DIAGNOSIS_SESSION;
      } else {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('session');
        if (encoded) {
          try {
            session = JSON.parse(decodeURIComponent(encoded));
          } catch (e) {
            console.error('Failed to parse diagnosis session:', e);
          }
        }
      }

      if (!session) {
        console.warn('診断セッション情報が見つかりません。予約フォーム単体アクセスの可能性があります。');
        return;
      }

      // 2. hidden にセット（存在チェックしながら）
      const setIfExists = (id, value) => {
        const el = document.getElementById(id);
        if (el && value !== undefined && value !== null) {
          el.value = value;
        }
      };

      setIfExists('email',            session.email);
      setIfExists('name',             session.name);
      setIfExists('role',             session.role);
      setIfExists('diagnosisId',      session.diagnosisId);
      setIfExists('scoreRank',        session.scoreRank);
      setIfExists('answersJson',      JSON.stringify(session.answers || []));
      setIfExists('segmentsJson',     JSON.stringify(session.segments || []));
      setIfExists('diagnosisSummary', session.diagnosisSummary || '');
    })();
  </script>
</body>
</html>
