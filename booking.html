<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>海外赴任サバイバル力診断 - 予約フォーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="booking">
    <section class="booking__intro">
      <h1>個別オンライン面談のご予約</h1>
      <p>
        診断でご入力いただいた情報をもとに、担当コーチが事前準備を行います。<br>
        ここでは<strong>ご希望の日時とセッション形式のみ</strong>をお知らせください。
      </p>
      <p class="booking__notice-email">
        診断で登録済みのメールアドレス宛に、予約確認メールをお送りします。<br>
        （メールアドレスを変更したい場合は、当日のオリエンテーションでお伝えください）
      </p>
    </section>

    <section class="booking__form">
      <form id="booking-form" method="post" action="https://script.google.com/macros/s/AKfycbzOAklmvXSihppwOvvL-N0fIPgjnKVGRfCOxTin59-V8af_Ijz9DL7LXuJQyMkI4mEP/exec">
        <!--
          // VERSION: booking.html v2026-04-24-1900
          // UPDATED: 2026-04-24 19:00 JST
          // CHANGES:
          //  - 予約フォームの「ユーザー入力必須項目」を3つに限定
          //      * 第1希望日時 (firstChoiceDatetime)
          //      * 第2希望日時 (secondChoiceDatetime)
          //      * 希望セッション形式 (sessionType)
          //  - 診断フォームで取得済みの情報は再入力させず、
          //    hidden input 経由でバックエンドに引き継ぐ構造に統一
          //  - 2026年欧米のオンラインマーケティングにおける
          //    「摩擦の少ない予約ファネル」「AIファーストなデータ構造」
          //    のトレンドを踏まえた設計に変更
          // REASON:
          //  - 診断で得たデータを活かして、予約ステップと後続メール、
          //    カレンダーイベントで「診断結果に基づく一文のパーソナライズ」を実現するため
          //  - 入力項目を最小化し、予約完了までのステップ数と心理的負荷を減らすため
        -->


        <!-- 事前カルテ Q1〜Q5（2026-04-25 v3.2.0 設問刷新） -->
        <!-- v4.1.0 2026-04-25: 氏名・法人名・部署名フィールドを追加 -->

        <!-- 氏名 -->
        <div class="form-group form-group--name">
          <label>お名前 <span class="required">必須</span></label>
          <div class="name-input-group">
            <div class="name-input-wrap">
              <input type="text" id="last_name" name="last_name" placeholder="姓（例：山田）" required autocomplete="family-name">
              <span class="name-input-label">姓</span>
            </div>
            <div class="name-input-wrap">
              <input type="text" id="first_name" name="first_name" placeholder="名（例：太郎）" required autocomplete="given-name">
              <span class="name-input-label">名</span>
            </div>
          </div>
        </div>

        <!-- 法人名・部署名 -->
        <div class="form-group">
          <label for="company_name">法人名（会社名） <span class="required">必須</span></label>
          <input type="text" id="company_name" name="company_name" placeholder="例：株式会社グローバル商事" required autocomplete="organization">
        </div>

        <div class="form-group">
          <label for="department_name">部署名 <span class="required">必須</span></label>
          <input type="text" id="department_name" name="department_name" placeholder="例：海外営業部" required autocomplete="organization-title">
        </div>

        <!-- メールアドレス -->
        <div class="form-group">
          <label for="email_input">メールアドレス <span class="required">必須</span></label>
          <input type="email" id="email_input" name="email_input" placeholder="例：yamada@example.com" required autocomplete="email">
          <p class="form-hint">予約確定メール・面談前アンケートのリンクをお送りします。</p>
        </div>

        <hr class="form-divider">

        <div class="form-group">
          <label>Q1. 現在のあなたの主な役割に最も近いものを1つ選んでください。 <span class="required">必須</span></label>
          <div class="karte-radio-group">
            <label class="karte-radio-label"><input type="radio" name="q1_role" value="A" required> A. 現地拠点（または新拠点）の立ち上げ・事業開発責任者</label>
            <label class="karte-radio-label"><input type="radio" name="q1_role" value="B"> B. 既存拠点のマネジメント（売上・利益・人材マネジメントなど）の責任者</label>
            <label class="karte-radio-label"><input type="radio" name="q1_role" value="C"> C. 特定プロジェクト（生産移管、システム導入など）のプロジェクトマネージャー</label>
            <label class="karte-radio-label"><input type="radio" name="q1_role" value="D"> D. 本社側の立場で、現地拠点をサポート・モニタリングする管理職</label>
            <label class="karte-radio-label"><input type="radio" name="q1_role" value="E"> E. 上記以外（特殊なミッションや専門職として赴任予定／赴任中）</label>
          </div>
        </div>

        <div class="form-group">
          <label>Q2. 海外赴任先で想定している（または現在の）チーム構成に最も近いものを選んでください。 <span class="required">必須</span></label>
          <p class="form-hint">A〜CとD〜Eの両方を選びたい場合は、より重要だと感じるほうを選んでください。</p>
          <div class="karte-radio-group">
            <label class="karte-radio-label"><input type="radio" name="q2_team" value="A" required> A. 現地スタッフのみを直接マネジメントする（日本人部下はいない）</label>
            <label class="karte-radio-label"><input type="radio" name="q2_team" value="B"> B. 日本人と現地スタッフが混在するチームをマネジメントする</label>
            <label class="karte-radio-label"><input type="radio" name="q2_team" value="C"> C. 直属の部下はおらず、プロジェクトベースで現地メンバーと関わる</label>
            <label class="karte-radio-label"><input type="radio" name="q2_team" value="D"> D. 少人数（1〜3名程度）のチームをマネジメントする</label>
            <label class="karte-radio-label"><input type="radio" name="q2_team" value="E"> E. 中〜大規模（4名以上）のチームをマネジメントする</label>
          </div>
        </div>

        <div class="form-group">
          <label>Q3. あなたご自身の、これまでの海外・異文化経験に最も近いものを選んでください。 <span class="required">必須</span></label>
          <div class="karte-radio-group">
            <label class="karte-radio-label"><input type="radio" name="q3_experience" value="A" required> A. 海外赴任の経験があり、1年以上現地で勤務したことがある</label>
            <label class="karte-radio-label"><input type="radio" name="q3_experience" value="B"> B. 長期出張や駐在もどき（数か月〜1年程度）の経験がある</label>
            <label class="karte-radio-label"><input type="radio" name="q3_experience" value="C"> C. 留学や研修などで、3か月以上海外に滞在したことがある</label>
            <label class="karte-radio-label"><input type="radio" name="q3_experience" value="D"> D. 短期出張や旅行での短期滞在のみ（3か月未満）</label>
            <label class="karte-radio-label"><input type="radio" name="q3_experience" value="E"> E. 海外滞在経験はほとんどない／ほぼゼロに近い</label>
          </div>
        </div>

        <div class="form-group">
          <label>Q4. あなたが今後もっとも頻繁に英語を使うと想定している場面はどれですか。（一番近いものを1つ） <span class="required">必須</span></label>
          <div class="karte-radio-group">
            <label class="karte-radio-label"><input type="radio" name="q4_hours" value="A" required> A. 社内会議（本社・現地拠点とのオンライン／対面）</label>
            <label class="karte-radio-label"><input type="radio" name="q4_hours" value="B"> B. 顧客・取引先との打ち合わせ・商談</label>
            <label class="karte-radio-label"><input type="radio" name="q4_hours" value="C"> C. 現地スタッフとの1on1・評価面談・日常マネジメント</label>
            <label class="karte-radio-label"><input type="radio" name="q4_hours" value="D"> D. メール・チャット・レポートなどの文書コミュニケーション</label>
            <label class="karte-radio-label"><input type="radio" name="q4_hours" value="E"> E. 子どもの学校・医療機関・行政窓口など、家庭関連のやり取り</label>
          </div>
        </div>

        <div class="form-group">
          <label>Q5. この講義を通じて「いちばん変えたい」と思っていることに最も近いものを選んでください。 <span class="required">必須</span></label>
          <div class="karte-radio-group">
            <label class="karte-radio-label"><input type="radio" name="q5_budget" value="A" required> A. 英語での会議や交渉で、黙り込まずに自分の意見・判断を伝えられるようになりたい</label>
            <label class="karte-radio-label"><input type="radio" name="q5_budget" value="B"> B. 在庫不足・納期遅延・クレームなどのトラブル時にも、英語で冷静に対応できるようになりたい</label>
            <label class="karte-radio-label"><input type="radio" name="q5_budget" value="C"> C. 家族が直面する学校・生活・医療の問題に対して、保護者・配偶者として英語で対応できるようになりたい</label>
            <label class="karte-radio-label"><input type="radio" name="q5_budget" value="D"> D. 異文化の前提を理解し、「なぜうまくいかないのか」を理屈として説明できるようになりたい</label>
            <label class="karte-radio-label"><input type="radio" name="q5_budget" value="E"> E. 海外赴任全体（仕事と家庭）のリスクと目標を整理し、自分なりの「成功パターン」を描けるようになりたい</label>
          </div>
        </div>

        <hr class="form-divider">
        <!-- 1. ユーザー入力項目（希望日時） -->
        <div class="form-group">
          <label for="firstChoiceDatetime">第1希望日時</label>
          <input id="firstChoiceDatetime"
                 name="firstChoiceDatetime"
                 type="datetime-local"
                 required>
        </div>

        <div class="form-group">
          <label for="secondChoiceDatetime">第2希望日時</label>
          <input id="secondChoiceDatetime"
                 name="secondChoiceDatetime"
                 type="datetime-local"
                 required>
        </div>

        <div class="form-group">
          <label>セッション形式</label>
          <div class="session-type-fixed">
            <span class="session-icon">🎥</span>
            <strong>Google Meet（オンラインビデオ通話）</strong>
            <p class="session-note">予約確定後、Google Meet のリンクを自動でお送りします。</p>
          </div>
          <input type="hidden" id="sessionType" name="sessionType" value="google_meet">
        </div>

        <!-- 2. hidden: 診断データ一式（パーソナライズ用） -->
        <!--
          // 以下の hidden フィールドは、診断フォーム側で構築した
          // DIAGNOSIS_SESSION オブジェクトから自動で埋められる前提。
          // GAS/カレンダー/メール/生成AI が共通で利用する。
        -->
        <input type="hidden" id="email"            name="email">
        <input type="hidden" id="name"             name="name">
        <input type="hidden" id="role"             name="role">
        <input type="hidden" id="diagnosisId"      name="diagnosisId">
        <input type="hidden" id="scoreRank"        name="scoreRank">
        <input type="hidden" id="answersJson"      name="answersJson">
        <input type="hidden" id="segmentsJson"     name="segmentsJson">
        <input type="hidden" id="diagnosisSummary" name="diagnosisSummary">

        <!--
          // aiProfileVersion:
          //  - 生成AIが参照するプロファイル構造のバージョン管理用。
          //  - 将来JSON構造を変更する際の互換性判定に使用する想定。
        -->
        <input type="hidden" id="aiProfileVersion" name="aiProfileVersion" value="v1">

        <button type="submit" class="btn btn-primary">
          この内容で予約する
        </button>
      </form>
    </section>
  </main>

  <script>
    // VERSION: booking.js inline v2026-04-24-1900
    // UPDATED: 2026-04-24 19:00 JST
    // CHANGES:
    //  - 診断結果オブジェクト (DIAGNOSIS_SESSION or URL パラメータ "session")
    //    を取得し、予約フォームの hidden フィールドに展開する処理を追加。
    //  - これにより、バックエンド (Code.gs) で
    //      * personalizedLine (診断に基づく一文)
    //      * カレンダーイベント description
    //      * 予約確認メール本文
    //    のパーソナライズが可能になる。
    // REASON:
    //  - 「診断→予約→面談」の全フェーズで、一貫した文脈を維持しつつ、
    //    ユーザーに同じ情報を何度も入力させないため。
    //  - 生成AIによる8週間カリキュラム自動生成のためのデータ基盤を整えるため。

    (function initializeBookingForm() {
      // 1. 診断側からのデータ受け取り
      //    - window.DIAGNOSIS_SESSION を優先
      //    - 無ければ URL パラメータ "session" (JSON 文字列) を見る
      let session = null;

      if (window.DIAGNOSIS_SESSION) {
        session = window.DIAGNOSIS_SESSION;
      } else {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('session');
        if (encoded) {
          try {
            session = JSON.parse(decodeURIComponent(encoded));
          } catch (e) {
            console.error('Failed to parse diagnosis session:', e);
          }
        }
      }

      if (!session) {
        console.warn('診断セッション情報が見つかりません。予約フォーム単体アクセスの可能性があります。');
        return;
      }

      // 2. hidden にセット（存在チェックしながら）
      const setIfExists = (id, value) => {
        const el = document.getElementById(id);
        if (el && value !== undefined && value !== null) {
          el.value = value;
        }
      };

      setIfExists('email',            session.email);
      setIfExists('name',             session.name);
      setIfExists('role',             session.role);
      setIfExists('diagnosisId',      session.diagnosisId);
      setIfExists('scoreRank',        session.scoreRank);
      setIfExists('answersJson',      JSON.stringify(session.answers || []));
      setIfExists('segmentsJson',     JSON.stringify(session.segments || []));
      setIfExists('diagnosisSummary', session.diagnosisSummary || '');
    })();
  </script>

  <script>
    window.BOOKING_CONFIG = {
      karteGasEndpoint: 'https://script.google.com/macros/s/AKfycbzOAklmvXSihppwOvvL-N0fIPgjnKVGRfCOxTin59-V8af_Ijz9DL7LXuJQyMkI4mEP/exec'
    };
  </script>
  <script src="js/karte-form.js"></script>
</body>
</html>
